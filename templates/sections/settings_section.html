<div class="fade-in-up">
    <h3 class="mb-4">Account Settings</h3>
  
    <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: var(--border-radius-md); max-width: 400px;">
        <h4 class="mb-3">Change Password</h4>
        <form id="passwordForm">
            <div class="form-group">
                <label for="currentPassword" class="mb-1">Current Password</label>
                <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
            </div>
            <div class="form-group">
                <label for="newPassword" class="mb-1">New Password</label>
                <input type="password" class="form-control" id="newPassword" name="newPassword" required>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-lock"></i> Update Password</button>
            <div id="passwordMsg" class="mt-3 font-weight-bold"></div>
        </form>
    </div>
</div>

<script>
// Password form AJAX
$('#passwordForm').submit(function (e) {
    e.preventDefault();
    $.ajax({
        type: 'POST',
        url: '/change_password',
        data: {
            currentPassword: $('#currentPassword').val(),
            newPassword: $('#newPassword').val()
        },
        success: function (response) {
            const msgEl = $('#passwordMsg');
            msgEl.text(response.message);
            if (response.status === 'success') {
                msgEl.css('color', 'var(--accent-success)');
                $('#passwordForm')[0].reset();
                setTimeout(() => msgEl.text(''), 3000);
            } else {
                msgEl.css('color', 'var(--accent-danger)');
            }
        }
    });
});
</script>
