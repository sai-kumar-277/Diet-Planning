<div class="fade-in-up">
    <h3 class="mb-4">Connect & Community</h3>
    <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
      <div class="glass-card text-center delay-1">
        <div class="feature-icon-wrapper mx-auto mb-3" style="color: var(--accent-primary); border-color: rgba(139,92,246,0.3);"><i class="fas fa-user-md"></i></div>
        <h4 class="mb-3">Connect with a Doctor</h4>
        <button class="btn btn-outline btn-block">Find Doctor</button>
      </div>
      <div class="glass-card text-center delay-2">
        <div class="feature-icon-wrapper mx-auto mb-3" style="color: var(--accent-success); border-color: rgba(16,185,129,0.3);"><i class="fas fa-comments"></i></div>
        <h4 class="mb-3">Join Group Chat</h4>
        <button class="btn btn-primary btn-block">Join Chat</button>
      </div>
      <div class="glass-card text-center delay-3">
        <div class="feature-icon-wrapper mx-auto mb-3" style="color: var(--accent-warning); border-color: rgba(245,158,11,0.3);"><i class="fas fa-user-friends"></i></div>
        <h4 class="mb-3">Find a Diet Buddy</h4>
        <button class="btn btn-outline btn-block" style="border-color: var(--accent-warning); color: var(--accent-warning);">Find Buddy</button>
      </div>
    </div>
</div>
